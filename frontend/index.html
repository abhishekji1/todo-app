<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>To-Do List</title>
  <style>
    body { font-family: Arial; margin: 2rem; }
    .todo { border:1px solid #888; padding:8px; margin:6px 0; display:flex; justify-content:space-between; }
    .done { text-decoration: line-through; color: gray; }
  </style>
</head>
<body>
  <h1>To-Do List</h1>
  <form id="form">
    <input id="title" placeholder="Title" required />
    <input id="due_date" type="date" />
    <textarea id="desc" placeholder="Description"></textarea>
    <button type="submit">Add</button>
  </form>
  <div id="list"></div>

  <script>
    const backend = 'https://todo-app-65rc.onrender.com'; // replace
    async function load() {
      const res = await fetch(backend + '/todos');
      const todos = await res.json();
      const list = document.getElementById('list');
      list.innerHTML = '';
      todos.forEach(t => {
        const div = document.createElement('div');
        div.className = 'todo';
        const info = document.createElement('div');
        info.innerHTML = `<strong class="${t.completed?'done':''}">${t.title}</strong>
          <div>${t.description||''}</div>
          <div>Due: ${t.due_date||'—'}</div>`;
        const actions = document.createElement('div');
        const toggle = document.createElement('button');
        toggle.textContent = t.completed ? 'Undo' : 'Complete';
        toggle.onclick = async () => { await fetch(`${backend}/todos/${t.id}/toggle`, { method: 'PATCH' }); load(); };
        const del = document.createElement('button');
        del.textContent = 'Delete';
        del.onclick = async () => { await fetch(`${backend}/todos/${t.id}`, { method: 'DELETE' }); load(); };
        actions.append(toggle, del);
        div.append(info, actions);
        list.appendChild(div);
      });
    }

    document.getElementById('form').addEventListener('submit', async e => {
      e.preventDefault();
      const title = document.getElementById('title').value;
      const description = document.getElementById('desc').value;
      const due_date = document.getElementById('due_date').value || null;
      await fetch(backend + '/todos', {
        method: 'POST',
        headers: { 'Content-Type':'application/json' },
        body: JSON.stringify({ title, description, due_date })
      });
      document.getElementById('form').reset();
      load();
    });

    load();
  </script>
</body>
</html>
